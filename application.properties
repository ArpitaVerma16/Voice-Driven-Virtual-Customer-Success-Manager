# OpenTelemetry Configuration
otel.service.name=vcsm
otel.traces.exporter=jaeger
otel.exporter.jaeger.endpoint=http://localhost:14250
otel.instrumentation.spring-web.enabled=true
otel.instrumentation.spring-webmvc.enabled=true\
# application-dev.properties
spring.elasticsearch.uris=http://localhost:9200
elasticsearch.host=localhost
elasticsearch.port=9200

# Enable Elasticsearch indexing
elasticsearch.enabled=true

# Bulk indexing settings
elasticsearch.bulk.size=100
elasticsearch.bulk.interval=5000

# GraphQL Configuration
spring.graphql.graphiql.enabled=true
spring.graphql.graphiql.path=/graphiql
spring.graphql.schema.printer.enabled=true
spring.graphql.path=/graphql

# CORS for GraphQL
spring.graphql.cors.allowed-origins=*
spring.graphql.cors.allowed-methods=GET,POST,OPTIONS
spring.graphql.cors.allowed-headers=*

# Security for GraphQL
spring.graphql.websocket.path=/graphql/ws

# Audit Log Configuration
audit.logging.enabled=true
audit.logging.verify-on-startup=true
audit.logging.hash-algorithm=SHA-256
audit.logging.max-log-entries=1000000
audit.logging.retention-days=365

# Performance
audit.logging.async=true
audit.logging.batch-size=100
audit.logging.flush-interval=5000