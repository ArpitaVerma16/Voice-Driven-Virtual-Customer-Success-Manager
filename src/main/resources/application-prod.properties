# Production Database (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vcsmdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable H2 console in production
spring.h2.console.enabled=false

# Thymeleaf caching enabled for performance
spring.thymeleaf.cache=true

# Error handling - never expose internals
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Rate limiting
rate.limit.enabled=true
rate.limit.default.capacity=${RATE_LIMIT_CAPACITY:100}
rate.limit.default.duration=60
rate.limit.default.refill=${RATE_LIMIT_REFILL:50}
